<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Namiboosting site</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg,#0f0f14,#1a1a22);
  color: white;
}

/* LOGIN */
.login-container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.login-box {
  background: #1c1c24;
  padding: 30px;
  border-radius: 10px;
  width: 350px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.login-box h2 {
  text-align: center;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 5px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  background: #ff7b42;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  color: white;
  font-weight: bold;
}

/* PANEL */
.panel {
  display: none;
}

.sidebar {
  width: 230px;
  height: 100vh;
  background: #1c1c24;
  position: fixed;
  padding: 20px;
}

.sidebar h2 {
  color: #ff7b42;
}

.sidebar a {
  display: block;
  margin: 15px 0;
  color: white;
  text-decoration: none;
}

.main {
  margin-left: 250px;
  padding: 20px;
}

.card {
  background: #1c1c24;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 5px;
  border: none;
}

</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div class="login-container" id="loginPage">
  <div class="login-box">
    <h2>Sign In</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Sign In</button>
  </div>
</div>

<!-- PANEL -->
<div class="panel" id="panel">
  <div class="sidebar">
    <h2>RBPanel</h2>
    <a href="#">Dashboard</a>
    <a href="#">New Order</a>
    <a href="#">Orders</a>
    <a href="#">Services</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>

  <div class="main">
    <div class="card">
      <h3>Dashboard</h3>
      <p>Total Orders: <span id="orders">0</span></p>
    </div>

    <div class="card">
      <h3>Create Order</h3>
      <select id="service">
        <option>Facebook followers</option>
        <option>Facebook live views</option>
        <option>Instagram live views</option>
      </select>
      <input type="text" id="link" placeholder="Enter link">
      <input type="number" id="quantity" placeholder="Quantity">
      <button onclick="createOrder()">Submit Order</button>
    </div>

    <div class="card">
      <h3>Orders</h3>
      <ul id="orderList"></ul>
    </div>
  </div>
</div>

<script>
let orderCount = 0;

// DEMO LOGIN (username: admin, password: 1234)
function login() {
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;

  if (user === 'admin' && pass === '1234') {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
  } else {
    alert('Wrong login');
  }
}

function logout() {
  document.getElementById('panel').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
}

function createOrder() {
  const service = document.getElementById('service').value;
  const link = document.getElementById('link').value;
  const quantity = document.getElementById('quantity').value;

  if (!link || !quantity) {
    alert('Fill all fields');
    return;
  }

  orderCount++;
  document.getElementById('orders').innerText = orderCount;

  const li = document.createElement('li');
  li.innerText = service + ' | ' + link + ' | ' + quantity;

  document.getElementById('orderList').appendChild(li);
}
</script>

</body>
</html>
